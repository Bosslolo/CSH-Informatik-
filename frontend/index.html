<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSH Auto Data Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 800px; margin-top: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; border-top: 4px solid #3498db; }
        .value { font-size: 2.5em; font-weight: bold; margin: 10px 0; color: #3498db; }
        .label { color: #888; text-transform: uppercase; font-size: 0.9em; }
        .status { margin-bottom: 20px; padding: 10px 20px; border-radius: 20px; background: #27ae60; font-weight: bold; }
        .timestamp { margin-top: 30px; color: #555; font-size: 0.8em; }
        h1 { color: #f1c40f; }
    </style>
</head>
<body>
    <h1>🚗 CSH Auto Data Machine</h1>
    <div id="status" class="status">SYSTEM ONLINE (UTC SYNC)</div>
    
    <div class="dashboard">
        <div class="card">
            <div class="label">Engine RPM</div>
            <div id="rpm" class="value">0</div>
        </div>
        <div class="card" style="border-top-color: #e74c3c;">
            <div class="label">Speed (KM/H)</div>
            <div id="speed" class="value">0</div>
        </div>
        <div class="card" style="border-top-color: #f1c40f;">
            <div class="label">Fuel Level (L)</div>
            <div id="fuel" class="value">0.0</div>
        </div>
        <div class="card" style="border-top-color: #2ecc71;">
            <div class="label">Motor Temp (°C)</div>
            <div id="temp" class="value">0.0</div>
        </div>
    </div>

    <div id="time" class="timestamp">Syncing with US timezone...</div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('http://localhost:3000/api/live');
                const data = await response.json();
                
                document.getElementById('rpm').innerText = Math.round(data.rpm);
                document.getElementById('speed').innerText = Math.round(data.speed_kmh);
                document.getElementById('fuel').innerText = data.fuel_liters.toFixed(2);
                document.getElementById('temp').innerText = data.motor_temp.toFixed(1);
                document.getElementById('time').innerText = 'UTC Timestamp: ' + data.timestamp;
            } catch (err) {
                document.getElementById('status').innerText = 'BACKEND OFFLINE';
                document.getElementById('status').style.background = '#c0392b';
            }
        }
        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
