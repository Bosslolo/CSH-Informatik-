<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSH Auto - RPM Monitor</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .header { margin-bottom: 30px; text-align: center; }
        h1 { color: #58a6ff; font-size: 1.5rem; letter-spacing: 1px; }

        .rpm-card { 
            background: #161b22; 
            padding: 50px; 
            border-radius: 16px; 
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 280px;
        }

        .label { color: #8b949e; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 10px; }
        .value { font-size: 5rem; font-weight: bold; color: #58a6ff; font-family: 'Courier New', Courier, monospace; }
        .unit { font-size: 1.2rem; color: #484f58; margin-top: -10px; font-weight: bold; }

        .status-bar {
            margin-top: 30px;
            padding: 5px 15px;
            background: rgba(56, 139, 253, 0.1);
            border: 1px solid rgba(56, 139, 253, 0.4);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #58a6ff;
        }

        .timestamp { margin-top: 20px; font-size: 0.7rem; color: #484f58; }
    </style>
</head>
<body>
    <div class="header">
        <h1>CSH Auto Data Machine</h1>
    </div>

    <div class="rpm-card">
        <div class="label">Engine Speed</div>
        <div id="rpm" class="value">0</div>
        <div class="unit">RPM</div>
    </div>

    <div id="status" class="status-bar">System Online // Secure Connection</div>
    <div id="time" class="timestamp">Fetching telemetry...</div>

    <script>
        async function updateRPM() {
            try {
                const response = await fetch('http://127.0.0.1:3000/api/live', {
                    headers: { 'x-api-key': 'csh-secure-v1' }
                });
                const data = await response.json();
                
                document.getElementById('rpm').innerText = Math.round(data.rpm).toLocaleString();
                document.getElementById('time').innerText = 'LAST UPDATE: ' + data.timestamp;
            } catch (err) {
                document.getElementById('rpm').innerText = "OFFLINE";
                document.getElementById('rpm').style.color = "#ff7b72";
                document.getElementById('status').innerText = "Backend Connection Failed";
            }
        }
        setInterval(updateRPM, 500);
        updateRPM();
    </script>
</body>
</html>
