<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSH Auto Data Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>CSH Auto Data</h1>
        <p class="sidebar-subtitle">Local Dashboard Client</p>
        <nav>
          <a href="#/" data-nav="/">Dashboard</a>
          <a href="#/recordings" data-nav="/recordings">Recordings</a>
          <a href="#/recordings/demo-001" data-nav="/recordings/:id">Replay</a>
          <a href="#/settings" data-nav="/settings">Settings</a>
        </nav>
        <div id="source-badge" class="source-badge source-badge--degraded" title="Data source">
          <span class="source-badge-dot" aria-hidden="true"></span>
          <span class="source-badge-body">
            <span class="source-badge-label">Waiting for data</span>
            <span class="source-badge-tag">OFFLINE</span>
          </span>
        </div>
        <div class="sidebar-note">
          <strong>Note:</strong> If no backend is reachable, the client automatically uses simulated data.
        </div>
      </aside>
      <main class="main">
        <header class="page-header">
          <h2 id="page-title">Dashboard</h2>
          <p id="page-subtitle">Live values, connection status and polling interval</p>
        </header>
        <section id="status-banner" class="status-banner waiting"></section>
        <section id="view" class="view"></section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
